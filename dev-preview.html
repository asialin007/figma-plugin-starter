<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figma 批量重命名插件 - 预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .preview-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .preview-header {
      background: #1b1b1b;
      color: white;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
    }

    iframe {
      display: block;
      border: none;
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="preview-header">
      Figma 插件预览 (400x660)
    </div>
    <iframe id="plugin-frame" width="400" height="660"></iframe>
  </div>

  <script>
    const iframe = document.getElementById('plugin-frame');

    // 模拟 Figma 插件环境
    const mockParent = {
      postMessage: (data) => {
        console.log('UI → Plugin:', data);
        // 模拟插件响应
        if (data.pluginMessage?.type === 'GET_SELECTION_INFO') {
          setTimeout(() => {
            window.postMessage({
              pluginMessage: {
                type: 'SELECTION_INFO',
                selectedName: 'Rectangle 1',
                layerType: 'FRAME',
                count: 1
              }
            }, '*');
          }, 100);
        } else if (data.pluginMessage?.type === 'APPLY_RENAME') {
          setTimeout(() => {
            window.postMessage({
              pluginMessage: {
                type: 'SELECTION_INFO',
                selectedName: 'Button_active_01',
                count: 1
              }
            }, '*');
          }, 100);
        }
      }
    };

    // 将 parent 挂载到 iframe 内容窗口
    iframe.contentWindow.parent = mockParent;

    // 加载编译后的 UI JS
    iframe.onload = () => {
      const script = document.createElement('script');
      script.src = './build/ui.js';
      iframe.contentDocument.head.appendChild(script);
    };

    // 监听来自 UI 的消息
    window.addEventListener('message', (event) => {
      console.log('Plugin → UI:', event.data);
    });

    // 初始化 iframe 内容
    iframe.srcdoc = `
      <!DOCTYPE html>
      <html>
      <head>
        <style>
          body { margin: 0; overflow: hidden; }
        </style>
      </head>
      <body>
        <div id="root"></div>
      </body>
      </html>
    `;
  </script>
</body>
</html>
